<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Piña GrowShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="layout.css">
</head>
<body class="bg-[#0a0f0b] text-white">
    <header class="p-6 border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-primary">🍍 Piña Grow</h1>
            <div class="flex gap-4">
                <input type="text" id="search" placeholder="Buscar..." class="bg-white/5 border border-white/10 rounded-full px-4 py-1 text-sm outline-none focus:border-primary">
                <a href="admin.html" class="opacity-20 hover:opacity-100 transition-opacity">⚙️</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="flex gap-2 mb-10 overflow-x-auto pb-4">
            <button onclick="filter('all')" class="bg-primary text-black px-6 py-2 rounded-full font-bold text-xs">TODO</button>
            <button onclick="filter('smoke')" class="bg-white/5 px-6 py-2 rounded-full font-bold text-xs">SMOKE</button>
            <button onclick="filter('cultivo')" class="bg-white/5 px-6 py-2 rounded-full font-bold text-xs">CULTIVO</button>
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script type="module">
        import { fetchProducts, renderProducts } from './products.js';
        let items = [];

        async function start() {
            items = await fetchProducts();
            renderProducts(items, 'grid');
        }

        window.filter = (c) => {
            const filtered = c === 'all' ? items : items.filter(p => p.category === c);
            renderProducts(filtered, 'grid');
        };

        document.getElementById('search').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = items.filter(p => p.name.toLowerCase().includes(q));
            renderProducts(filtered, 'grid');
        };

        start();
    </script>
</body>
</html>
