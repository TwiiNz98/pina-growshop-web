<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Piña GrowShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0f0b; color: white; }
        input, select, textarea { background: #111a13 !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; transition: all 0.3s; }
        input:focus { border-color: #4caf50 !important; box-shadow: 0 0 10px rgba(76,175,80,0.2); }
        .pina-card { background: #141b15; border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-4">
        <div class="pina-card p-8 max-w-sm w-full text-center">
            <h1 class="text-4xl mb-4">🍍</h1>
            <h2 class="text-xl font-bold mb-6">Panel Administrativo</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña" class="w-full mb-4 p-3 rounded-xl text-center">
            <button onclick="adminLogin()" class="w-full bg-[#4caf50] text-black font-bold py-3 rounded-xl hover:scale-105 transition-transform">Entrar</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden min-h-screen p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-2xl font-['Fredoka'] text-[#4caf50]">Piña Admin 🍍</h1>
                <div class="flex gap-4">
                    <button onclick="exportProducts()" class="text-xs bg-white/5 px-4 py-2 rounded-lg hover:bg-white/10">Exportar JSON</button>
                    <button onclick="sessionStorage.clear(); location.reload();" class="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-lg">Salir</button>
                </div>
            </header>

            <div class="grid lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1">
                    <div class="pina-card p-6 sticky top-8">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <span id="form-mode">Nuevo Producto</span>
                        </h2>
                        
                        <input type="hidden" id="edit-index" value="-1">
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Nombre</label>
                                <input type="text" id="f-name" class="w-full p-3 rounded-xl text-sm" placeholder="Ej: Bong Vidrio Blue">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">ID (Slug)</label>
                                    <input type="text" id="f-id" class="w-full p-3 rounded-xl text-sm" placeholder="bong-blue">
                                </div>
                                <div>
                                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Categoría</label>
                                    <select id="f-category" class="w-full p-3 rounded-xl text-sm">
                                        <option value="smoke">Smoke</option>
                                        <option value="cultivo">Cultivo</option>
                                        <option value="aromas">Aromas</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Precio ($)</label>
                                    <input type="number" id="f-price" class="w-full p-3 rounded-xl text-sm">
                                </div>
                                <div>
                                    <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Oferta ($)</label>
                                    <input type="number" id="f-compare" class="w-full p-3 rounded-xl text-sm">
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Stock Actual</label>
                                <input type="number" id="f-stock" value="1" class="w-full p-3 rounded-xl text-sm">
                            </div>

                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Ruta Imagen</label>
                                <input type="text" id="f-image" class="w-full p-3 rounded-xl text-sm" placeholder="img/producto.jpg">
                            </div>

                            <div>
                                <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Descripción Corta</label>
                                <textarea id="f-desc" class="w-full p-3 rounded-xl text-sm h-20"></textarea>
                            </div>

                            <div class="flex gap-4 py-2">
                                <label class="flex items-center gap-2 text-xs cursor-pointer">
                                    <input type="checkbox" id="f-featured" class="accent-[#4caf50]"> Destacado
                                </label>
                                <label class="flex items-center gap-2 text-xs cursor-pointer">
                                    <input type="checkbox" id="f-new" class="accent-[#4caf50]"> Nuevo
                                </label>
                            </div>

                            <button onclick="saveProduct()" class="w-full bg-[#4caf50] text-black font-bold p-4 rounded-xl hover:bg-white transition-colors">
                                GUARDAR CAMBIOS
                            </button>
                            <button onclick="location.reload()" class="w-full text-xs text-gray-500 py-2">Cancelar / Limpiar</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="pina-card p-6">
                        <h2 class="text-lg font-bold mb-6">Inventario</h2>
                        <div id="products-table" class="space-y-2">
                            </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
