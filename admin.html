<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Piña GrowShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="tokens.css">
</head>
<body class="bg-[#0a0f0b] text-white font-['Inter'] p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-['Fredoka'] text-primary">Panel Admin 🍍</h1>
            <a href="index.html" class="text-sm bg-white/5 px-4 py-2 rounded-lg hover:bg-white/10">Volver a la web</a>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <form id="product-form" class="md:col-span-1 bg-[#141b15] p-6 rounded-3xl border border-white/5 h-fit sticky top-8">
                <h2 class="text-xl font-bold mb-4">Agregar / Editar</h2>
                <div class="space-y-4">
                    <input type="hidden" id="p-index" value="-1">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Nombre del producto</label>
                        <input type="text" id="p-name" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm focus:border-primary outline-none" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Precio</label>
                            <input type="number" id="p-price" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none" required>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Categoría</label>
                            <select id="p-category" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none">
                                <option value="smoke">Smoke</option>
                                <option value="cultivo">Cultivo</option>
                                <option value="aromas">Aromas</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">URL Imagen (img/nombre.jpg)</label>
                        <input type="text" id="p-image" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none">
                    </div>
                    <div class="flex items-center gap-4 py-2">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" id="p-featured" class="accent-primary"> Destacado
                        </label>
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" id="p-new" class="accent-primary"> Nuevo
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-primary text-black font-bold py-3 rounded-xl hover:bg-secondary transition-colors mt-2">Guardar Producto</button>
                    <button type="button" id="export-btn" class="w-full bg-white/5 text-white font-bold py-3 rounded-xl border border-white/10 hover:bg-white/10 transition-colors">Copiar JSON para GitHub</button>
                </div>
            </form>

            <div class="md:col-span-2">
                <h2 class="text-xl font-bold mb-4">Inventario Actual</h2>
                <div id="admin-list" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
